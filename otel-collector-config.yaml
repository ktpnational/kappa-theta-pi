receivers:
  otlp:
    protocols:
      http:
        cors:
          allowed_origins:
            - http://localhost:3000
            - https://www.kappathetapi.org

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  logging:
    loglevel: debug
  prometheus:
    endpoint: "0.0.0.0:8889"
  grafana:
    endpoint: "${GRAFANA_CLOUD_URL}"
    api_key: "${GRAFANA_API_KEY}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging, grafana]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, grafana]

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'nextjs'
    static_configs:
      - targets: ['localhost:3000']
    metrics_path: '/api/metrics'
