receivers:
  otlp:
    protocols:
      http:
        cors:
          allowed_origins:
            - http://localhost:3000
            - https://your-production-domain.com

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  logging:
    loglevel: debug
  prometheus:
    endpoint: "0.0.0.0:8889"
  grafana:
    endpoint: "${GRAFANA_CLOUD_URL}"
    api_key: "${GRAFANA_API_KEY}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging, grafana]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, grafana] 
