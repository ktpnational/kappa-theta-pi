name: 🐳 Docker Prod

on:
  workflow_dispatch:
  push:
    branches: [master]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create env file
        run: |
          touch .env
          echo SECRET=${{ secrets.SECRET }} > .env

      - name: Docker run
        run: docker compose up -d --force-recreate --build
